apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-sender
  labels:
    app: go-sender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-sender
  template:
    metadata:
      labels:
        app: go-sender
    spec:
      containers:
        - name: sender
          image: go-sender:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9999
          env:
            - name: KAFKA_BROKERS
              value: kafka.default.svc.cluster.local:9092
            - name: KAFKA_TOPIC
              value: injectMessage
            - name: HTTP_ADDR
              value: :9999
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9999
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sender-service
spec:
  selector:
    app: go-sender
  ports:
    - name: http
      port: 9999
      targetPort: 9999
